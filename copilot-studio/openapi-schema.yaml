swagger: '2.0'
info:
  title: PubMed Search MCP
  description: |
    MCP endpoint wrapper for PubMed Search MCP.

    This schema is intended for Microsoft Copilot Studio / Power Apps custom
    connector onboarding. The real MCP tool discovery still happens through the
    `/mcp` endpoint at runtime.

    Recommended runtime modes:
    - Full schema mode: run_server.py --transport streamable-http --copilot-compatible
    - Simplified mode: run_copilot.py
  version: 0.5.0
  contact:
    name: PubMed Search MCP
    url: https://github.com/u9401066/pubmed-search-mcp
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

host: your-server.example.com
basePath: /
schemes:
  - https

paths:
  /mcp:
    post:
      summary: PubMed Search MCP endpoint
      description: |
        Streamable HTTP MCP endpoint.

        The tool surface is discovered dynamically by the MCP client at runtime.
        Depending on how the server is started, this endpoint may expose either:
        - the full primary MCP surface (currently 45 tools in v0.5.7), or
        - the simplified Copilot-compatible tool surface.
      x-ms-agentic-protocol: mcp-streamable-1.0
      operationId: InvokeMCP
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        '200':
          description: MCP response payload
          schema:
            type: object
        '400':
          description: Invalid request
        '500':
          description: Server error

tags:
  - name: MCP
    description: Model Context Protocol endpoint
