<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">PubMed Search MCP research workflow</title>
  <desc id="desc">A high level workflow from research question through search, session evidence, deep reading, and reusable outputs.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#244850"/>
    </marker>
    <style>
      .bg { fill: #f8faf7; }
      .title { font: 700 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17252a; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526168; }
      .box { stroke-width: 2; rx: 18; }
      .label { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #152126; }
      .body { font: 400 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3e4a50; }
      .small { font: 600 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #435159; }
      .arrow { fill: none; stroke: #244850; stroke-width: 2.5; marker-end: url(#arrow); }
      .soft-arrow { fill: none; stroke: #77868c; stroke-width: 2; marker-end: url(#arrow); stroke-dasharray: 5 6; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="540"/>
  <text class="title" x="52" y="58">Research workflow at a glance</text>
  <text class="subtitle" x="52" y="86">Start with intent, keep identifiers in session, then move from evidence discovery to reusable outputs.</text>

  <rect class="box" x="48" y="136" width="160" height="116" fill="#eaf4f0" stroke="#3a7c69"/>
  <text class="label" x="72" y="174">1. Question</text>
  <text class="body" x="72" y="202">Natural language</text>
  <text class="body" x="72" y="224">PICO, ICD, topic</text>

  <rect class="box" x="248" y="136" width="168" height="116" fill="#eef2ff" stroke="#4f68a8"/>
  <text class="label" x="272" y="174">2. Strategy</text>
  <text class="body" x="272" y="202">MeSH, synonyms</text>
  <text class="body" x="272" y="224">query analysis</text>

  <rect class="box" x="456" y="136" width="168" height="116" fill="#fff5df" stroke="#b27b21"/>
  <text class="label" x="480" y="174">3. Search</text>
  <text class="body" x="480" y="202">unified_search</text>
  <text class="body" x="480" y="224">multi-source results</text>

  <rect class="box" x="664" y="136" width="172" height="116" fill="#edf7ff" stroke="#3578a7"/>
  <text class="label" x="688" y="174">4. Session</text>
  <text class="body" x="688" y="202">PMIDs, details</text>
  <text class="body" x="688" y="224">follow-up context</text>

  <rect class="box" x="876" y="136" width="276" height="116" fill="#f8eff7" stroke="#99609a"/>
  <text class="label" x="900" y="174">5. Deep reading</text>
  <text class="body" x="900" y="202">details, citations, full text</text>
  <text class="body" x="900" y="224">figures, timelines, metrics</text>

  <path class="arrow" d="M 208 194 H 236"/>
  <path class="arrow" d="M 416 194 H 444"/>
  <path class="arrow" d="M 624 194 H 652"/>
  <path class="arrow" d="M 836 194 H 864"/>

  <rect class="box" x="876" y="312" width="276" height="146" fill="#eef7eb" stroke="#5f8d3e"/>
  <text class="label" x="900" y="350">6. Reusable outputs</text>
  <text class="body" x="900" y="378">RIS, MEDLINE, CSL JSON</text>
  <text class="body" x="900" y="400">local wiki / Foam notes</text>
  <text class="body" x="900" y="422">saved and scheduled pipelines</text>

  <path class="arrow" d="M 1014 252 V 300"/>

  <rect x="48" y="312" width="230" height="128" rx="18" fill="#ffffff" stroke="#c9d4d0" stroke-width="2"/>
  <text class="small" x="72" y="350">Typical user prompt</text>
  <text class="body" x="72" y="378">Find papers, explain the</text>
  <text class="body" x="72" y="400">strategy, keep PMIDs in</text>
  <text class="body" x="72" y="422">session, then export.</text>

  <rect x="330" y="312" width="424" height="128" rx="18" fill="#ffffff" stroke="#c9d4d0" stroke-width="2"/>
  <text class="small" x="354" y="350">Agent routing pattern</text>
  <text class="body" x="354" y="378">The client chooses tools by task: query intelligence,</text>
  <text class="body" x="354" y="400">search, exploration, full text, export, and pipeline reuse.</text>
  <path class="soft-arrow" d="M 542 312 C 542 285 542 280 542 258"/>

  <path class="soft-arrow" d="M 278 376 C 460 492 728 496 876 404"/>
</svg>
