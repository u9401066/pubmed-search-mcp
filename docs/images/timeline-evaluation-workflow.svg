<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Evaluation and timeline workflow</title>
  <desc id="desc">How search results become citation metrics, milestones, landmark detection, timeline comparison, and topic evolution outputs.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263f46"/>
    </marker>
    <style>
      .bg { fill: #fbfcfa; }
      .title { font: 700 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17252a; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526168; }
      .box { stroke-width: 2; rx: 18; }
      .label { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #152126; }
      .body { font: 400 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3e4a50; }
      .arrow { fill: none; stroke: #263f46; stroke-width: 2.5; marker-end: url(#arrow); }
      .axis { stroke: #465a61; stroke-width: 3; }
      .dot { stroke: #ffffff; stroke-width: 3; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="52" y="58">Evaluation, milestones, and timeline comparison</text>
  <text class="subtitle" x="52" y="86">Use these tools when the question is what mattered, when it changed, or how topics differ.</text>

  <rect class="box" x="58" y="158" width="198" height="118" fill="#eef2ff" stroke="#4f68a8"/>
  <text class="label" x="84" y="198">Evidence set</text>
  <text class="body" x="84" y="228">session PMIDs or</text>
  <text class="body" x="84" y="250">topic search results</text>

  <rect class="box" x="318" y="108" width="214" height="116" fill="#eaf4f0" stroke="#3a7c69"/>
  <text class="label" x="344" y="148">get_citation_metrics</text>
  <text class="body" x="344" y="178">RCR, citations,</text>
  <text class="body" x="344" y="200">influence signals</text>

  <rect class="box" x="318" y="296" width="214" height="116" fill="#fff5df" stroke="#b27b21"/>
  <text class="label" x="344" y="336">build_timeline</text>
  <text class="body" x="344" y="366">events, landmark</text>
  <text class="body" x="344" y="388">scoring, diagnostics</text>

  <rect class="box" x="594" y="198" width="220" height="116" fill="#f8eff7" stroke="#99609a"/>
  <text class="label" x="620" y="238">Milestone analysis</text>
  <text class="body" x="620" y="268">policy evidence,</text>
  <text class="body" x="620" y="290">topic phase changes</text>

  <rect class="box" x="876" y="198" width="220" height="116" fill="#edf7ff" stroke="#3578a7"/>
  <text class="label" x="902" y="238">compare_timelines</text>
  <text class="body" x="902" y="268">parallel topics,</text>
  <text class="body" x="902" y="290">gaps and divergence</text>

  <path class="arrow" d="M 256 216 C 286 184 298 166 318 166"/>
  <path class="arrow" d="M 256 216 C 286 282 298 336 318 354"/>
  <path class="arrow" d="M 532 166 C 570 188 584 220 594 246"/>
  <path class="arrow" d="M 532 354 C 574 330 586 292 594 270"/>
  <path class="arrow" d="M 814 256 H 864"/>

  <line class="axis" x1="106" y1="500" x2="1064" y2="500"/>
  <circle class="dot" cx="210" cy="500" r="13" fill="#4f68a8"/>
  <circle class="dot" cx="430" cy="500" r="13" fill="#3a7c69"/>
  <circle class="dot" cx="650" cy="500" r="13" fill="#b27b21"/>
  <circle class="dot" cx="870" cy="500" r="13" fill="#99609a"/>
  <text class="body" x="170" y="536">first report</text>
  <text class="body" x="386" y="536">method shift</text>
  <text class="body" x="604" y="536">landmark</text>
  <text class="body" x="826" y="536">guideline</text>
</svg>
