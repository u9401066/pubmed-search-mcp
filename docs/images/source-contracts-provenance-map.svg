<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Source contracts and provenance map</title>
  <desc id="desc">How direct sources, metadata graphs, OA resolvers, figure sources, institutional handoff, and browser fallback differ in provenance and access promises.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263f46"/>
    </marker>
    <style>
      .bg { fill: #fbfcfa; }
      .title { font: 700 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17252a; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526168; }
      .box { stroke-width: 2; rx: 18; }
      .label { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #152126; }
      .body { font: 400 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3e4a50; }
      .arrow { fill: none; stroke: #263f46; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="660"/>
  <text class="title" x="52" y="58">Source contracts and provenance</text>
  <text class="subtitle" x="52" y="86">Agents should preserve whether evidence came from a canonical source, aggregator, resolver, or access handoff.</text>

  <rect class="box" x="64" y="164" width="224" height="116" fill="#eaf4f0" stroke="#3a7c69"/>
  <text class="label" x="90" y="204">Canonical records</text>
  <text class="body" x="90" y="234">PubMed, NCBI Entrez,</text>
  <text class="body" x="90" y="256">Gene, PubChem, ClinVar</text>

  <rect class="box" x="64" y="344" width="224" height="116" fill="#eef2ff" stroke="#4f68a8"/>
  <text class="label" x="90" y="384">Metadata graphs</text>
  <text class="body" x="90" y="414">OpenAlex, Crossref,</text>
  <text class="body" x="90" y="436">Semantic Scholar</text>

  <rect class="box" x="396" y="164" width="224" height="116" fill="#fff5df" stroke="#b27b21"/>
  <text class="label" x="422" y="204">OA/fulltext paths</text>
  <text class="body" x="422" y="234">Europe PMC, Unpaywall,</text>
  <text class="body" x="422" y="256">CORE, downloader chain</text>

  <rect class="box" x="396" y="344" width="224" height="116" fill="#f8eff7" stroke="#99609a"/>
  <text class="label" x="422" y="384">Visual sources</text>
  <text class="body" x="422" y="414">PMC OA figures, Open-i,</text>
  <text class="body" x="422" y="436">image URLs and captions</text>

  <rect class="box" x="728" y="164" width="224" height="116" fill="#edf7ff" stroke="#3578a7"/>
  <text class="label" x="754" y="204">Institutional access</text>
  <text class="body" x="754" y="234">OpenURL, direct DOI,</text>
  <text class="body" x="754" y="256">EZproxy, browser broker</text>

  <rect class="box" x="728" y="344" width="224" height="116" fill="#f1f5e8" stroke="#71883b"/>
  <text class="label" x="754" y="384">Agent promise</text>
  <text class="body" x="754" y="414">name source, host,</text>
  <text class="body" x="754" y="436">license and limitations</text>

  <path class="arrow" d="M 288 222 H 384"/>
  <path class="arrow" d="M 288 402 H 384"/>
  <path class="arrow" d="M 620 222 H 716"/>
  <path class="arrow" d="M 620 402 H 716"/>
  <path class="arrow" d="M 840 280 V 332"/>

  <rect x="118" y="540" width="964" height="58" rx="18" fill="#ffffff" stroke="#c9d4d0" stroke-width="2"/>
  <text class="body" x="144" y="574">Direct records can anchor identifiers; indirect sources must carry upstream host and article-level license context.</text>
</svg>
