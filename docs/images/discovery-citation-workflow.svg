<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Seed paper discovery workflow</title>
  <desc id="desc">How one trusted PMID becomes article details, related papers, backward references, forward citations, a citation tree, and a prioritized reading set.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263f46"/>
    </marker>
    <style>
      .bg { fill: #fbfcfd; }
      .title { font: 700 30px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172126; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #59676d; }
      .stage { font: 800 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #59676d; }
      .box { stroke-width: 2; rx: 10; }
      .label { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #152126; }
      .label-light { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .body { font: 400 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3f4c52; }
      .body-light { font: 400 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #dcebe7; }
      .tool { font: 700 13px Consolas, "Cascadia Mono", monospace; fill: #263f46; }
      .arrow { fill: none; stroke: #263f46; stroke-width: 2.5; marker-end: url(#arrow); }
      .soft-arrow { fill: none; stroke: #667780; stroke-width: 2; stroke-dasharray: 5 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="54" y="58">Explore from a seed paper</text>
  <text class="subtitle" x="54" y="86">Use one trusted PMID as an anchor, then separate peer articles, origins, later citations, and triage signals.</text>

  <text class="stage" x="74" y="136">ANCHOR</text>
  <rect class="box" x="54" y="154" width="238" height="132" fill="#263f46" stroke="#15272d"/>
  <text class="label-light" x="82" y="196">Seed Paper</text>
  <text class="body-light" x="82" y="228">PMID from search,</text>
  <text class="body-light" x="82" y="250">user input, or session</text>

  <text class="stage" x="356" y="136">VALIDATE</text>
  <rect class="box" x="336" y="154" width="244" height="132" fill="#e4f2ee" stroke="#2f7a69"/>
  <text class="label" x="364" y="194">Article Details</text>
  <text class="tool" x="364" y="224">fetch_article_details</text>
  <text class="body" x="364" y="252">metadata, abstract, journal, DOI</text>

  <text class="stage" x="650" y="76">EXPAND CONTEXT</text>
  <rect class="box" x="628" y="94" width="248" height="116" fill="#eef2ff" stroke="#4f68a8"/>
  <text class="label" x="656" y="132">Related Papers</text>
  <text class="tool" x="656" y="160">find_related_articles</text>
  <text class="body" x="656" y="186">nearby studies and topic variants</text>

  <rect class="box" x="628" y="250" width="248" height="116" fill="#fff5df" stroke="#a96f00"/>
  <text class="label" x="656" y="288">Backward Lineage</text>
  <text class="tool" x="656" y="316">get_article_references</text>
  <text class="body" x="656" y="342">prior work the seed depends on</text>

  <rect class="box" x="628" y="406" width="248" height="116" fill="#f8eff7" stroke="#99609a"/>
  <text class="label" x="656" y="444">Forward Lineage</text>
  <text class="tool" x="656" y="472">find_citing_articles</text>
  <text class="body" x="656" y="498">later papers that reused or challenged it</text>

  <text class="stage" x="968" y="204">STRUCTURE</text>
  <rect class="box" x="944" y="222" width="268" height="132" fill="#edf7ff" stroke="#3578a7"/>
  <text class="label" x="972" y="264">Citation Tree</text>
  <text class="tool" x="972" y="294">build_citation_tree</text>
  <text class="body" x="972" y="322">forward, backward, network views</text>

  <text class="stage" x="968" y="410">PRIORITIZE</text>
  <rect class="box" x="944" y="428" width="268" height="132" fill="#f1f5e8" stroke="#71883b"/>
  <text class="label" x="972" y="470">Triage Output</text>
  <text class="tool" x="972" y="500">get_citation_metrics</text>
  <text class="body" x="972" y="528">rank groups by relevance, RCR, and role</text>

  <rect class="box" x="336" y="432" width="244" height="104" fill="#ffffff" stroke="#c5d0d5"/>
  <text class="label" x="364" y="472">Read Separately</text>
  <text class="body" x="364" y="502">Related = peer context</text>
  <text class="body" x="364" y="524">Refs = origins, citing = impact</text>

  <path class="arrow" d="M 292 220 H 324"/>
  <path class="arrow" d="M 580 220 C 604 188 608 158 628 152"/>
  <path class="arrow" d="M 580 220 C 604 248 608 296 628 308"/>
  <path class="arrow" d="M 580 220 C 600 340 606 444 628 464"/>
  <path class="arrow" d="M 876 152 C 920 178 934 226 944 270"/>
  <path class="arrow" d="M 876 308 H 932"/>
  <path class="arrow" d="M 876 464 C 920 442 934 374 944 316"/>
  <path class="arrow" d="M 1078 354 V 416"/>
  <path class="soft-arrow" d="M 580 484 H 932"/>

  <rect x="54" y="604" width="1158" height="66" rx="10" fill="#ffffff" stroke="#c5d0d5" stroke-width="2"/>
  <text class="body" x="82" y="634">Agent guidance: do not collapse the three evidence groups into one list. Keep related papers, references, and citing papers separate so the user can see context, origin, and downstream impact.</text>
  <text class="body" x="82" y="656">Developer boundary: MCP tools return structured evidence; ranking and final interpretation stay in the application/agent workflow.</text>
</svg>
