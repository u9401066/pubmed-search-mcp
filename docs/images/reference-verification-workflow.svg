<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Reference verification workflow</title>
  <desc id="desc">How a plain text reference list is normalized, matched against PubMed evidence, reviewed, and exported as an audit trail.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263f46"/>
    </marker>
    <style>
      .bg { fill: #fbfcfa; }
      .title { font: 700 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17252a; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526168; }
      .box { stroke-width: 2; rx: 18; }
      .label { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #152126; }
      .body { font: 400 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3e4a50; }
      .arrow { fill: none; stroke: #263f46; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="560"/>
  <text class="title" x="52" y="58">Reference verification</text>
  <text class="subtitle" x="52" y="86">Turn unstructured references into PubMed-backed evidence with confidence and mismatch notes.</text>

  <rect class="box" x="58" y="166" width="190" height="126" fill="#f5f1ea" stroke="#947245"/>
  <text class="label" x="84" y="206">Raw references</text>
  <text class="body" x="84" y="236">plain text list,</text>
  <text class="body" x="84" y="258">draft manuscript</text>

  <rect class="box" x="298" y="166" width="208" height="126" fill="#eaf4f0" stroke="#3a7c69"/>
  <text class="label" x="324" y="206">Parse candidates</text>
  <text class="body" x="324" y="236">title, authors, year,</text>
  <text class="body" x="324" y="258">journal, DOI hints</text>

  <rect class="box" x="556" y="166" width="208" height="126" fill="#eef2ff" stroke="#4f68a8"/>
  <text class="label" x="582" y="206">PubMed matching</text>
  <text class="body" x="582" y="236">verify_reference_list</text>
  <text class="body" x="582" y="258">PMID evidence</text>

  <rect class="box" x="814" y="166" width="208" height="126" fill="#fff5df" stroke="#b27b21"/>
  <text class="label" x="840" y="206">Review result</text>
  <text class="body" x="840" y="236">exact, likely,</text>
  <text class="body" x="840" y="258">ambiguous, missing</text>

  <rect class="box" x="456" y="378" width="288" height="100" fill="#f8eff7" stroke="#99609a"/>
  <text class="label" x="484" y="416">Correction queue</text>
  <text class="body" x="484" y="446">fix citations before export or publication</text>

  <path class="arrow" d="M 248 229 H 286"/>
  <path class="arrow" d="M 506 229 H 544"/>
  <path class="arrow" d="M 764 229 H 802"/>
  <path class="arrow" d="M 918 292 C 842 360 774 406 744 424"/>
  <path class="arrow" d="M 456 424 C 350 392 258 342 188 292"/>

  <rect x="74" y="360" width="270" height="90" rx="18" fill="#ffffff" stroke="#c9d4d0" stroke-width="2"/>
  <text class="body" x="100" y="396">Do not treat generated summaries as proof.</text>
  <text class="body" x="100" y="422">Use PubMed matches as the evidence anchor.</text>
</svg>
