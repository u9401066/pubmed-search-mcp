<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Search and query intelligence workflow</title>
  <desc id="desc">How natural language, PICO, ICD codes, MeSH expansion, source selection, and session storage connect in the search workflow.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263f46"/>
    </marker>
    <style>
      .bg { fill: #fbfcfa; }
      .title { font: 700 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17252a; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526168; }
      .box { stroke-width: 2; rx: 18; }
      .label { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #152126; }
      .body { font: 400 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3e4a50; }
      .small { font: 600 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #435159; }
      .arrow { fill: none; stroke: #263f46; stroke-width: 2.5; marker-end: url(#arrow); }
      .soft { fill: none; stroke: #7b8a90; stroke-width: 2; stroke-dasharray: 5 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="52" y="58">Search and query intelligence</text>
  <text class="subtitle" x="52" y="86">Use strategy tools before execution when the question needs PICO, MeSH, ICD conversion, or source control.</text>

  <rect class="box" x="48" y="145" width="188" height="124" fill="#eaf4f0" stroke="#3a7c69"/>
  <text class="label" x="74" y="184">Research intent</text>
  <text class="body" x="74" y="214">topic, comparison,</text>
  <text class="body" x="74" y="236">ICD code, or PICO</text>

  <rect class="box" x="276" y="88" width="220" height="114" fill="#eef2ff" stroke="#4f68a8"/>
  <text class="label" x="302" y="127">parse_pico</text>
  <text class="body" x="302" y="157">population, intervention,</text>
  <text class="body" x="302" y="179">comparison, outcome</text>

  <rect class="box" x="276" y="250" width="220" height="114" fill="#edf7ff" stroke="#3578a7"/>
  <text class="label" x="302" y="289">analyze_search_query</text>
  <text class="body" x="302" y="319">intent, complexity,</text>
  <text class="body" x="302" y="341">recommended sources</text>

  <rect class="box" x="540" y="145" width="220" height="124" fill="#fff5df" stroke="#b27b21"/>
  <text class="label" x="566" y="184">generate_search_queries</text>
  <text class="body" x="566" y="214">MeSH, synonyms, filters,</text>
  <text class="body" x="566" y="236">Boolean candidates</text>

  <rect class="box" x="804" y="145" width="188" height="124" fill="#f8eff7" stroke="#99609a"/>
  <text class="label" x="830" y="184">unified_search</text>
  <text class="body" x="830" y="214">source expression,</text>
  <text class="body" x="830" y="236">ranking, filters</text>

  <rect class="box" x="1032" y="145" width="120" height="124" fill="#f1f5e8" stroke="#71883b"/>
  <text class="label" x="1056" y="184">Session</text>
  <text class="body" x="1056" y="214">PMIDs</text>
  <text class="body" x="1056" y="236">cached</text>

  <path class="arrow" d="M 236 207 H 264"/>
  <path class="arrow" d="M 496 145 C 522 160 530 176 540 192"/>
  <path class="arrow" d="M 496 307 C 522 292 530 252 540 226"/>
  <path class="arrow" d="M 760 207 H 792"/>
  <path class="arrow" d="M 992 207 H 1020"/>
  <path class="soft" d="M 236 207 C 248 142 256 126 276 121"/>
  <path class="soft" d="M 236 207 C 252 274 258 300 276 307"/>

  <rect x="84" y="430" width="302" height="118" rx="18" fill="#ffffff" stroke="#c9d4d0" stroke-width="2"/>
  <text class="small" x="110" y="466">When to use this path</text>
  <text class="body" x="110" y="494">Clinical comparison, systematic search,</text>
  <text class="body" x="110" y="516">noisy terms, ICD codes, or source gating.</text>

  <rect x="448" y="430" width="302" height="118" rx="18" fill="#ffffff" stroke="#c9d4d0" stroke-width="2"/>
  <text class="small" x="474" y="466">Key controls</text>
  <text class="body" x="474" y="494">sources="auto,-semantic_scholar"</text>
  <text class="body" x="474" y="516">filters="year:2020-, clinical:therapy"</text>

  <rect x="812" y="430" width="302" height="118" rx="18" fill="#ffffff" stroke="#c9d4d0" stroke-width="2"/>
  <text class="small" x="838" y="466">Next step</text>
  <text class="body" x="838" y="494">Use read_session or get_session_pmids</text>
  <text class="body" x="838" y="516">instead of asking the model to memorize IDs.</text>
</svg>
