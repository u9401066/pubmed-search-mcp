<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Export and local notes workflow</title>
  <desc id="desc">How session PMIDs become citation exports, local markdown notes, sidecar metadata, and editable literature review artifacts.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263f46"/>
    </marker>
    <style>
      .bg { fill: #fbfcfa; }
      .title { font: 700 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17252a; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526168; }
      .box { stroke-width: 2; rx: 18; }
      .label { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #152126; }
      .body { font: 400 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3e4a50; }
      .small { font: 600 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #435159; }
      .arrow { fill: none; stroke: #263f46; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="640"/>
  <text class="title" x="52" y="58">Citation export and local literature notes</text>
  <text class="subtitle" x="52" y="86">Separate verified bibliographic data from editable interpretation and local knowledge-base structure.</text>

  <rect class="box" x="64" y="160" width="190" height="118" fill="#eef2ff" stroke="#4f68a8"/>
  <text class="label" x="90" y="200">PMID set</text>
  <text class="body" x="90" y="230">last session,</text>
  <text class="body" x="90" y="252">explicit IDs</text>

  <rect class="box" x="322" y="104" width="214" height="118" fill="#eaf4f0" stroke="#3a7c69"/>
  <text class="label" x="348" y="144">prepare_export</text>
  <text class="body" x="348" y="174">RIS, MEDLINE, CSL,</text>
  <text class="body" x="348" y="196">BibTeX, CSV, JSON</text>

  <rect class="box" x="322" y="306" width="214" height="118" fill="#fff5df" stroke="#b27b21"/>
  <text class="label" x="348" y="346">save_literature_notes</text>
  <text class="body" x="348" y="376">wiki, Foam, Markdown,</text>
  <text class="body" x="348" y="398">MedPaper profile</text>

  <rect class="box" x="620" y="104" width="214" height="118" fill="#edf7ff" stroke="#3578a7"/>
  <text class="label" x="646" y="144">Reference manager</text>
  <text class="body" x="646" y="174">Zotero, EndNote,</text>
  <text class="body" x="646" y="196">Mendeley import</text>

  <rect class="box" x="620" y="306" width="214" height="118" fill="#f8eff7" stroke="#99609a"/>
  <text class="label" x="646" y="346">Local note library</text>
  <text class="body" x="646" y="376">frontmatter, sidecars,</text>
  <text class="body" x="646" y="398">editable summaries</text>

  <rect class="box" x="918" y="204" width="210" height="118" fill="#f1f5e8" stroke="#71883b"/>
  <text class="label" x="944" y="244">Review artifact</text>
  <text class="body" x="944" y="274">auditable metadata</text>
  <text class="body" x="944" y="296">plus human notes</text>

  <path class="arrow" d="M 254 219 C 292 194 306 170 322 162"/>
  <path class="arrow" d="M 254 219 C 292 286 306 348 322 364"/>
  <path class="arrow" d="M 536 162 H 608"/>
  <path class="arrow" d="M 536 364 H 608"/>
  <path class="arrow" d="M 834 162 C 882 180 904 218 918 244"/>
  <path class="arrow" d="M 834 364 C 882 344 904 300 918 282"/>

  <rect x="106" y="500" width="988" height="70" rx="18" fill="#ffffff" stroke="#c9d4d0" stroke-width="2"/>
  <text class="small" x="132" y="532">Directory resolution</text>
  <text class="body" x="132" y="556">output_dir -> PUBMED_NOTES_DIR -> workspace references -> data dir references -> user data references</text>
</svg>
