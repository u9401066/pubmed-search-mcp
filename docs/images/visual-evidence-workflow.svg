<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Full text, figures, and biomedical image workflow</title>
  <desc id="desc">How full text, text-mined terms, article figures, and biomedical image search support evidence synthesis.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263f46"/>
    </marker>
    <style>
      .bg { fill: #fbfcfa; }
      .title { font: 700 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17252a; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526168; }
      .box { stroke-width: 2; rx: 18; }
      .label { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #152126; }
      .body { font: 400 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3e4a50; }
      .small { font: 600 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #435159; }
      .arrow { fill: none; stroke: #263f46; stroke-width: 2.5; marker-end: url(#arrow); }
      .soft { fill: none; stroke: #7b8a90; stroke-width: 2; stroke-dasharray: 5 6; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="52" y="58">Full text and visual evidence</text>
  <text class="subtitle" x="52" y="86">Use structured text, entity annotations, captions, image URLs, and image search as separate evidence channels.</text>

  <rect class="box" x="68" y="150" width="210" height="124" fill="#eef2ff" stroke="#4f68a8"/>
  <text class="label" x="94" y="190">Identifier</text>
  <text class="body" x="94" y="220">PMCID, PMID, DOI,</text>
  <text class="body" x="94" y="242">or session result</text>

  <rect class="box" x="338" y="150" width="210" height="124" fill="#eaf4f0" stroke="#3a7c69"/>
  <text class="label" x="364" y="190">get_fulltext</text>
  <text class="body" x="364" y="220">sections, provenance,</text>
  <text class="body" x="364" y="242">PDF or landing links</text>

  <rect class="box" x="608" y="92" width="220" height="116" fill="#fff5df" stroke="#b27b21"/>
  <text class="label" x="634" y="132">get_text_mined_terms</text>
  <text class="body" x="634" y="162">genes, diseases, drugs,</text>
  <text class="body" x="634" y="184">organisms, chemicals</text>

  <rect class="box" x="608" y="270" width="220" height="116" fill="#f8eff7" stroke="#99609a"/>
  <text class="label" x="634" y="310">get_article_figures</text>
  <text class="body" x="634" y="340">figure labels, captions,</text>
  <text class="body" x="634" y="362">image URLs, PDF links</text>

  <rect class="box" x="888" y="270" width="220" height="116" fill="#edf7ff" stroke="#3578a7"/>
  <text class="label" x="914" y="310">image search</text>
  <text class="body" x="914" y="340">Open-i and future</text>
  <text class="body" x="914" y="362">Europe PMC images</text>

  <rect class="box" x="452" y="462" width="296" height="92" fill="#f1f5e8" stroke="#71883b"/>
  <text class="label" x="480" y="500">Evidence synthesis</text>
  <text class="body" x="480" y="528">separate source text from agent interpretation</text>

  <path class="arrow" d="M 278 212 H 326"/>
  <path class="arrow" d="M 548 212 C 584 190 590 166 608 150"/>
  <path class="arrow" d="M 548 228 C 584 256 590 302 608 328"/>
  <path class="arrow" d="M 828 328 H 876"/>
  <path class="arrow" d="M 718 386 V 450"/>
  <path class="arrow" d="M 998 386 C 912 434 820 472 748 502"/>
  <path class="soft" d="M 443 274 C 456 360 492 424 552 462"/>

  <rect x="872" y="106" width="252" height="92" rx="18" fill="#ffffff" stroke="#c9d4d0" stroke-width="2"/>
  <text class="small" x="898" y="142">Availability boundary</text>
  <text class="body" x="898" y="170">Missing figures or full text means source limits,</text>
  <text class="body" x="898" y="190">not necessarily article absence.</text>
</svg>
