<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Custom pipeline DAG workflow</title>
  <desc id="desc">A custom search DAG expands topics, runs multiple searches, merges results, enriches metrics, filters articles, and returns an auditable output.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263f46"/>
    </marker>
    <style>
      .bg { fill: #fbfcfa; }
      .title { font: 700 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17252a; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526168; }
      .box { stroke-width: 2; rx: 18; }
      .label { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #152126; }
      .body { font: 400 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3e4a50; }
      .arrow { fill: none; stroke: #263f46; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="52" y="58">Custom pipeline DAG</text>
  <text class="subtitle" x="52" y="86">Use explicit step ids and inputs when a workflow needs branching, merging, and repeatable review.</text>

  <rect class="box" x="80" y="230" width="156" height="100" fill="#eef2ff" stroke="#4f68a8"/>
  <text class="label" x="106" y="268">expand</text>
  <text class="body" x="106" y="296">MeSH and terms</text>

  <rect class="box" x="320" y="120" width="156" height="100" fill="#eaf4f0" stroke="#3a7c69"/>
  <text class="label" x="346" y="158">search A</text>
  <text class="body" x="346" y="186">topic branch</text>

  <rect class="box" x="320" y="340" width="156" height="100" fill="#eaf4f0" stroke="#3a7c69"/>
  <text class="label" x="346" y="378">search B</text>
  <text class="body" x="346" y="406">comparison branch</text>

  <rect class="box" x="570" y="230" width="156" height="100" fill="#fff5df" stroke="#b27b21"/>
  <text class="label" x="596" y="268">merge</text>
  <text class="body" x="596" y="296">union, intersect, RRF</text>

  <rect class="box" x="810" y="120" width="156" height="100" fill="#f8eff7" stroke="#99609a"/>
  <text class="label" x="836" y="158">metrics</text>
  <text class="body" x="836" y="186">iCite signals</text>

  <rect class="box" x="810" y="340" width="156" height="100" fill="#edf7ff" stroke="#3578a7"/>
  <text class="label" x="836" y="378">filter</text>
  <text class="body" x="836" y="406">year, type, abstract</text>

  <rect class="box" x="1044" y="230" width="108" height="100" fill="#f1f5e8" stroke="#71883b"/>
  <text class="label" x="1068" y="268">output</text>
  <text class="body" x="1068" y="296">report</text>

  <path class="arrow" d="M 236 280 C 270 230 292 188 320 170"/>
  <path class="arrow" d="M 236 280 C 270 330 292 372 320 390"/>
  <path class="arrow" d="M 476 170 C 526 196 548 232 570 260"/>
  <path class="arrow" d="M 476 390 C 526 364 548 328 570 300"/>
  <path class="arrow" d="M 726 260 C 772 230 790 188 810 170"/>
  <path class="arrow" d="M 726 300 C 772 330 790 372 810 390"/>
  <path class="arrow" d="M 966 170 C 1016 190 1034 228 1044 258"/>
  <path class="arrow" d="M 966 390 C 1016 370 1034 332 1044 302"/>
</svg>
