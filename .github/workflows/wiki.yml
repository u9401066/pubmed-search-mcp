name: Sync GitHub Wiki

on:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/wiki.yml"
      - "README.md"
      - "README.zh-TW.md"
      - "ARCHITECTURE.md"
      - "DEPLOYMENT.md"
      - "docs/**"
      - "scripts/build_github_wiki.py"
      - "src/pubmed_search/presentation/mcp_server/TOOLS_INDEX.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --frozen --dev

      - name: Build wiki pages
        run: uv run python scripts/build_github_wiki.py --output build/github-wiki

      - name: Push wiki
        run: |
          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"
          if ! git ls-remote "$WIKI_URL" >/dev/null 2>&1; then
            echo "::warning::GitHub Wiki is enabled but not initialized. Create the first wiki page in the GitHub UI, then rerun this workflow."
            exit 0
          fi
          git clone "$WIKI_URL" wiki-repo
          rsync -a --delete --exclude ".git" build/github-wiki/ wiki-repo/
          git -C wiki-repo config user.name "github-actions[bot]"
          git -C wiki-repo config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C wiki-repo add .
          if git -C wiki-repo diff --cached --quiet; then
            echo "Wiki already up to date."
            exit 0
          fi
          git -C wiki-repo commit -m "Sync wiki docs"
          git -C wiki-repo branch -M master
          git -C wiki-repo push -u origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
